name: Full CI CD Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  ci:
    name: CI Level 4
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Up Express
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install All Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test
      - name: Build App
        run: npm run build
  
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest

    # ci mean ci finish first
    needs: ci

    # github.ref == 'refs/heads/main'
    # This checks which branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy placeholder
        run: echo "Sample deploy script here"